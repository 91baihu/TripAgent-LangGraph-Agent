# TripAgent Alembic 配置

[alembic]
# 迁移脚本目录
script_location = alembic

# SQLAlchemy 连接 URL（通过环境变量注入，此处留空）
# 实际运行时设置: DATABASE_URL=postgresql+asyncpg://user:pass@host:5432/tripagent
sqlalchemy.url =

# 日志
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
