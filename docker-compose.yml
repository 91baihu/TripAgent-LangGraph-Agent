# TripAgent docker-compose — 开发/测试环境一键部署
version: "3.9"

services:
  # ========== 数据库 ==========
  postgres:
    image: postgres:16-alpine
    container_name: tripagent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tripagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tripagent_dev}
      POSTGRES_DB: ${POSTGRES_DB:-tripagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tripagent} -d ${POSTGRES_DB:-tripagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 缓存 ==========
  redis:
    image: redis:7-alpine
    container_name: tripagent-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ========== FastAPI 后端 ==========
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tripagent-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - APP_ENV=${APP_ENV:-dev}
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER:-tripagent}:${POSTGRES_PASSWORD:-tripagent_dev}@postgres:5432/${POSTGRES_DB:-tripagent}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src:ro
    command: >
      sh -c "if [ -f /app/src/server/main.py ]; then
               python -m uvicorn src.server.main:app --host 0.0.0.0 --port 8000 --reload;
             else
               echo 'FastAPI not ready, starting Streamlit fallback...';
               python -m streamlit run src/main.py --server.port 8000 --server.address 0.0.0.0;
             fi"

  # ========== Streamlit 管理面板（仅开发环境） ==========
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tripagent-admin
    restart: unless-stopped
    profiles:
      - dev
      - admin
    depends_on:
      - api
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - API_BASE_URL=http://api:8000
    ports:
      - "${ADMIN_PORT:-8501}:8501"
    volumes:
      - ./src:/app/src:ro
    command: python -m streamlit run src/main.py --server.port 8501 --server.address 0.0.0.0

  # ========== Nginx 前端（生产环境） ==========
  nginx:
    image: nginx:1.27-alpine
    container_name: tripagent-nginx
    restart: unless-stopped
    profiles:
      - prod
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
